<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D modelling</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family:Arial, Helvetica, sans-serif;
            background: #ccc;
        }

        ul {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            margin: 0;
            padding: 0;
        }

        ul li {
            list-style: none;
            margin: 0 5px;
        }

        ul li a .fa {
            font-size: 40px;
            color: #262626;
            line-height: 80px;
            transition: 0.5s;
            padding-right: 14px;
        }

        ul li a span {
            padding: 0;
            margin: 0;
            position: absolute;
            top: 30px;
            color: #262626;
            letter-spacing: 4px;
            transition: 0.5s;
        }

        ul li a {
            text-decoration: none;
            
            display: block;
            width: 210px;
            height: 80px;
            background: #fff;
            text-align: left;
            padding-left: 20px;
            transform: rotate(-30deg) skew(25deg) translate(0, 0);
            transition: 0.5s;
            box-shadow: -20px 20px 10px rgba(0, 0, 0, 0.5);
        }

        ul li a:before {
            content: "";
            position: absolute;
            top: 10px;
            left: -20px;
            height: 100%;
            width: 20px;
            background: #b1b1b1;
            transform: 0, 5s;
            transform: rotate(0deg) skewY(-45deg);
        }

        ul li a:after {
            content: "";
            position: absolute;
            bottom: -20px;
            left: -10px;
            height: 20px;
            width: 100%;
            background: #b1b1b1;
            transform: 0, 5s;
            transform: rotate(0deg) skewX(-45deg);
        }

        ul li a:hover {
            transform: rotate(-30deg) skew(25deg) translate(20px, -15px);
            box-shadow: -50px 50px 50px rgba(0, 0, 0, 0.5);
        }

        ul li:hover .fa {
            color: #fff;
        }
        ul li:hover:nth-child(1) a {
            background: #4285F4;
        }
        ul li:hover:nth-child(1) a:before {
            background: #4285F4;
        }

        ul li:hover:nth-child(1) a:after {
            background: #4285F4;
        }
ul li:hover:nth-child(2) a {
            background: #FBBC05;
        }
        ul li:hover:nth-child(2) a:before {
            background: #FBBC05;
        }

        ul li:hover:nth-child(2) a:after {
            background: #FBBC05;
        }
ul li:hover:nth-child(3) a {
            background: #EB4335;
        }
        ul li:hover:nth-child(3) a:before {
            background: #EB4335;
        }

        ul li:hover:nth-child(3) a:after {
            background: #EB4335;
        }
        
        ul li:hover:nth-child(4) a {
            background: #34A853;
        }
        ul li:hover:nth-child(4) a:before {
            background: #34A853;
        }
        ul li:hover:nth-child(4) a:after {
            background: #34A853;
        }
    </style>
</head>

<body>
    <ul>
        <li><a href=""><img src="Images1/facebook.svg" class="fa" width="50px" alt=""> <span>Facebook</span></a></li>
        <li><a href=""><img src="Images1/twitter.svg" class="fa" width="50px" alt=""> <span>Twitter</span></a></li>
        <li><a href=""><img src="Images1/google.svg" class="fa" width="50px" alt=""> <span>Google</span></a></li>
        <li><a href=""><img src="Images1/tiktok.svg" class="fa" width="50px" alt=""> <span>Tiktok</span></a></li>
    </ul>
</body>

</html>
